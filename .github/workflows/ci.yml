name: FeedVote CI/CD Pipeline

# Trigger on push to main branch and pull requests
on:
  push:
    branches: [ main, feature ]
    # Skip pipeline if ONLY these files changed
    paths-ignore:
      - '**.md'                    # All markdown files (README.md, etc.)
      - '.gitignore'               # Git configuration
      - 'LICENSE'                  # License file
      - '.editorconfig'             # Editor settings
  pull_request:
    branches: [ main ]
    # Skip pipeline if ONLY these files changed
    paths-ignore:
      - '**.md'                    # All markdown files (README.md, etc.)
      - '.gitignore'               # Git configuration
      - 'LICENSE'                  # License file
      - '.editorconfig'             # Editor settings

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: feedvote-backend
  FRONTEND_IMAGE: feedvote-frontend
  PYTHON_VERSION: "3.10"
  BACKEND_URL: "http://localhost"
  BACKEND_PORT: 8000

jobs:
  # ====================
  # BACKEND BUILD & TEST
  # ====================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    # Set defaults for backend job
    defaults:
      run:
        working-directory: backend

    steps:
      # Clone repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better diff detection

      # Setup Python environment
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Cache pip dependencies (speeds up CI)
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-

      # Upgrade pip and install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "packaging>=24.0"
          pip install -r requirements.txt

      # Run tests with coverage
      - name: Run tests with pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term

      # Upload coverage reports
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      # Code quality check with flake8 (strict)
      - name: Lint with flake8
        run: |
          # Install flake8
          pip install flake8
          
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # Exit-zero treats all errors as warnings
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: false

      # Static code analysis with pylint (optional)
      - name: Analyze with pylint
        run: |
          pip install pylint
          pylint app/ --exit-zero --max-line-length=127 || true
        continue-on-error: true

  # ====================
  # FRONTEND BUILD & TEST
  # ====================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies (frontend)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-frontend-${{ hashFiles('frontend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-frontend-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Check if frontend runs without errors
      - name: Validate Streamlit app
        run: |
          streamlit config show
          python -c "import streamlit; print('✓ Streamlit import successful')"
        continue-on-error: false

  # ====================
  # SECURITY SCANNING
  # ====================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('backend/requirements.txt', 'frontend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-

      # Bandit: Security issue scanner for Python
      - name: Scan for security issues with Bandit
        run: |
          pip install bandit
          bandit -r backend/app/ frontend/ -f screen -ll || true
        continue-on-error: true

      # Safety: Check dependencies for known vulnerabilities
      - name: Check dependencies for vulnerabilities
        run: |
          pip install safety
          safety check --json || true
        continue-on-error: true

      # Check for hardcoded secrets
      - name: Detect secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.base_ref }}
          head: ${{ github.event.after || github.head_ref || 'HEAD' }}
          extra_args: --debug
        continue-on-error: true

  # ====================
  # DOCKER BUILD
  # ====================
  docker-build:
    name: Docker Build & Package
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]  # Wait for tests to pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install docker-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Build backend Docker image
        run: |
          docker build \
            --tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.BACKEND_IMAGE }}:latest \
            --file backend/Dockerfile \
            ./backend

      - name: Build frontend Docker image
        run: |
          docker build \
            --tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.FRONTEND_IMAGE }}:latest \
            --file frontend/Dockerfile \
            ./frontend

      - name: Save Docker image artifacts
        run: |
          docker save ${{ env.BACKEND_IMAGE }}:${{ github.sha }} -o backend-image.tar
          docker save ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -o frontend-image.tar

      - name: Upload Docker image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-docker-images
          path: |
            backend-image.tar
            frontend-image.tar

  # ====================
  # INTEGRATION TESTS
  # ====================
  integration-test:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install docker-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Download built Docker images
        uses: actions/download-artifact@v4
        with:
          name: built-docker-images
          path: docker-images

      - name: Load Docker images
        run: |
          docker load -i docker-images/backend-image.tar
          docker load -i docker-images/frontend-image.tar

      - name: Start services with Docker Compose
        env:
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_TAG: ${{ github.sha }}
        run: |
          docker-compose up -d --no-build
          echo "Waiting for services to be healthy..."
          sleep 10

      - name: Verify backend health
        run: |
          echo "Checking backend health..."
          for i in {1..30}; do
            if curl -f ${{ env.BACKEND_URL }}:${{ env.BACKEND_PORT }}/health; then
              echo "✓ Backend is healthy"
              exit 0
            fi
            echo "Attempt $i: Waiting for backend..."
            sleep 2
          done
          echo "✗ Backend failed to start"
          docker-compose logs backend
          exit 1

      - name: Test API endpoints
        run: |
          echo "Testing API endpoints..."
          curl -f ${{ env.BACKEND_URL }}:${{ env.BACKEND_PORT }}/ || exit 1
          echo "✓ Root endpoint working"
          curl -f ${{ env.BACKEND_URL }}:${{ env.BACKEND_PORT }}/health || exit 1
          echo "✓ Health endpoint working"
          curl -f ${{ env.BACKEND_URL }}:${{ env.BACKEND_PORT }}/docs || exit 1
          echo "✓ API docs endpoint working"

      - name: Stop Docker services
        if: always()
        run: |
          echo "Stopping services..."
          docker-compose down -v
          echo "✓ Services stopped and volumes removed"

      - name: Save service logs
        if: always()
        run: |
          docker-compose logs > service-logs.txt || true

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: service-logs.txt

  # ====================
  # DEPLOYMENT (CD STAGE)
  # ====================
  deploy:
    name: Deploy to Docker Hub
    runs-on: ubuntu-latest
    needs: integration-test
    # Only deploy on main branch (not on PRs)
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install docker-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Download built Docker images
        uses: actions/download-artifact@v4
        with:
          name: built-docker-images
          path: docker-images

      - name: Load Docker images
        run: |
          docker load -i docker-images/backend-image.tar
          docker load -i docker-images/frontend-image.tar

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Retag and push backend Docker image
        run: |
          docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/feedvote-backend:latest
          docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/feedvote-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/feedvote-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/feedvote-backend:${{ github.sha }}

      - name: Retag and push frontend Docker image
        run: |
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/feedvote-frontend:latest
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/feedvote-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/feedvote-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/feedvote-frontend:${{ github.sha }}

      - name: Log out from Docker Hub
        if: always()
        run: |
          docker logout

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully"
          echo ""
          echo "📦 Images pushed to Docker Hub:"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/feedvote-backend:latest"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/feedvote-backend:${{ github.sha }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/feedvote-frontend:latest"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/feedvote-frontend:${{ github.sha }}"

  # ====================
  # FINAL STATUS
  # ====================
  status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, security-scan, docker-build, integration-test, deploy]
    if: always()

    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.backend-test.result }}" != "success" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend-test.result }}" != "success" ]; then
            echo "❌ Frontend validation failed"
            exit 1
          fi
          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "❌ Docker build failed"
            exit 1
          fi
          if [ "${{ needs.integration-test.result }}" != "success" ]; then
            echo "❌ Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.deploy.result }}" != "success" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "❌ Deployment failed"
            exit 1
          fi
          echo "✓ All checks passed!"

      - name: Notify success
        if: success()
        run: |
          echo "✅ Pipeline completed successfully"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
