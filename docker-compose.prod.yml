version: "3.9"

services:
  db:
    image: mysql:8
    container_name: feedvote-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: feedvote
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - feedvote-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: feedvote-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql+pymysql://root:root@db:3306/feedvote"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - feedvote-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

  frontend:
    build: ./frontend
    container_name: feedvote-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: "http://backend:8000"
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    networks:
      - feedvote-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  feedvote-network:
    driver: bridge
